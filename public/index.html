<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sistema de clientes</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <div class="container py-4">

    <h1 class="mb-3">Lista de clientes</h1>

    <!-- Estado de WhatsApp -->
    <div class="mb-3" id="estadoWhatsapp"></div>
<!-- inicio carga -->
<div class="card shadow-sm mb-4">
      <div class="card-body">
        <h5 class="mb-3">Plantilla y carga de Excel</h5>

        <div class="row g-3">
          <div class="col-md-6">
                  <button class="btn btn-outline-primary w-100" onclick="descargarPlantilla()">

              Descargar plantilla vacía
            </button>
          </div>

          <div class="col-md-6">
             <label for="archivoExcel" class="form-label">Selecciona el Excel desde tu PC</label>
            <input type="file" id="archivoExcel" class="form-control mb-2" accept=".xlsx,.xls">
            
          </div>
        </div>

        <div id="estadoExcel" class="mt-3 text-muted"></div>
      </div>
    </div>
    <!-- Fin de Carga -->
    <!-- CONFIGURACIÓN -->
    <div class="card shadow-sm mb-4">
      <div class="card-body">

        <h5 class="mb-3">Configuración del envío</h5>

        <!-- MENSAJE -->
        <div class="mb-3">
          <label for="mensajePersonalizado" class="form-label">Mensaje</label>
          <textarea
            id="mensajePersonalizado"
            class="form-control"
            rows="4"
          >Hola {Nombre}, le contactamos por el servicio {Servicio}.</textarea>
        </div>

        <!-- ARCHIVOS -->
        <div class="row">

          <!-- IMAGEN -->
          <div class="col-md-6">
            <label for="archivoImagen" class="form-label">Seleccionar imagen</label>
            <input
              type="file"
              id="archivoImagen"
              class="form-control"
              accept="image/*"
            >
          </div>

          <!-- PDF -->
          <div class="col-md-6">
            <label for="archivoPdf" class="form-label">Seleccionar PDF</label>
            <input
              type="file"
              id="archivoPdf"
              class="form-control"
              accept=".pdf,application/pdf"
            >
          </div>

        </div>

        <!-- INFO -->
        <div class="alert alert-secondary mt-3 mb-0">
          Variables disponibles:
          <b>{Nombre}</b>,
          <b>{Servicio}</b>,
          <b>{Contacto}</b>
        </div>

      </div>
    </div>
  <!-- Barra -->

    <!-- Barra -->
<div class="card shadow-sm mb-4">
  <div class="card-body">
    <h5 class="mb-3">Progreso del envío</h5>

    <div class="progress" style="height: 25px;">
      <div
        id="barraProgreso"
        class="progress-bar progress-bar-striped progress-bar-animated"
        role="progressbar"
        style="width: 0%;"
      >
        0%
      </div>
    </div>

    <div id="textoProgreso" class="mt-2 text-muted">
      Esperando envío...
    </div>
  </div>
</div>
    <!-- TABLA -->
    <div class="card shadow-sm">
      <div class="card-body">

        

        <button class="btn btn-danger mb-3" onclick="enviarTodos()">
           Enviar a todos los pendientes
        </button>

        <div class="table-responsive">
          <table class="table table-bordered table-striped">

            <thead class="table-dark">
              <tr id="encabezado"></tr>
            </thead>

            <tbody id="cuerpoTabla"></tbody>

          </table>
        </div>

      </div>
    </div>

  </div>

  <!-- JS -->
  <script src="app.js"></script>

</body>
</html>
